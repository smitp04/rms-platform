[build]
builder = "nixpacks"
buildCommand = "npx prisma generate --schema=packages/db/prisma/schema.prisma && cd apps/web && npx next build && echo 'build-v4'"

[deploy]
startCommand = "npx prisma migrate deploy --schema=packages/db/prisma/schema.prisma && node apps/web/.next/standalone/apps/web/server.js"
restartPolicyType = "on_failure"
